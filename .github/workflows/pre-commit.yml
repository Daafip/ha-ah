---
name: Pre-commit

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.3"
      - name: Install the project
        run: uv sync --locked
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
